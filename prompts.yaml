    - raw: "TST* WAREHOUSE BAR AND K CEDAR CITY UT APPLE PAY ENDING IN 4873"
      clean: "Warehouse - Bebida"

monthly_summary:
  model: "gemini-3.1-flash-lite-preview"
  template: |
    You are a personal finance analyst. Below are all transactions for the user in {month_name}.

    Categorize each EXPENSE transaction (direction = "expense") into EXACTLY ONE of these categories.
    Do NOT invent new ones:
    Groceries, Dining, Gas, Subscriptions, Tuition, Transfers, Rent, Utilities, Entertainment, Shopping, Other.
    If unsure, use "Other".

    "Transfers" specifically means moving money between the user's OWN accounts:
    descriptions like "To Savings", "From Savings", "To Checking", "From Checking".
    These are not "spending" - they are internal movement.
    Venmo, Zelle, and similar peer-to-peer payments should be categorized by the
    description's context if available (e.g. "Venmo - Rent" -> Rent). When the
    description is just "Venmo" with no context, use "Other".

    Income transactions (direction = "income") are NEVER categorized into spend_by_category.
    They only contribute to total_income.

    The "income" / "expense" label after each transaction is AUTHORITATIVE. Do NOT re-classify
    based on the description text. Use it as-is.

    Then produce a structured JSON summary.

    Transactions for {month_name}:
    {transactions}
    {prior_context}

    Required JSON fields:
    - total_income: sum of all amounts where direction is "income"
    - total_expenses: sum of all amounts where direction is "expense"
    - net: total_income minus total_expenses
    - top_merchants: top 5 merchants by total expense (combine repeats of the same name), with name, total_spend, and count
    - spend_by_category: AGGREGATED list of EXPENSES ONLY (direction = "expense"). NEVER include income transactions. Exactly one entry per unique category. Each category appears AT MOST ONCE. The sum of all amounts MUST equal total_expenses.
    - observations: 2-4 short bullet observations about the month's spending patterns
    - commentary: 1-2 sentences of overall commentary

    Be concise. Use existing description text as merchant names. If a prior month is provided, include trend comparisons in your observations and commentary.
